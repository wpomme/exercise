AllCops:
  NewCops: enable
  SuggestExtensions: false

# 行の長さ（デフォルト: 120）
Layout/LineLength:
  Max: 160
  AllowedPatterns:
    # コメント行は除外
    - '\A\s*#'

# メトリクスに関するフォーマットは無効にする
Metrics:
  Enabled: false

# ドキュメントコメントの必須を無効化
Style/Documentation:
  Enabled: false

# frozen_string_literalのコメント必須を無効化
Style/FrozenStringLiteralComment:
  Enabled: false

# 文字列についてシングルクオート強制を無効化
Style/StringLiterals:
  Enabled: false

# メソッドの引数名は最低三文字以上でなくてもいい
Naming/MethodParameterName:
  Enabled: false
